name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Ensure private dependency token is configured
        run: |
          if [ -z "$CUSTOM_FIELDS_COMPOSER_TOKEN" ]; then
            echo "::error::CUSTOM_FIELDS_COMPOSER_TOKEN must have read access to ByJesper/laravel-custom-fields for Composer installs."
            exit 1
          fi
        env:
          CUSTOM_FIELDS_COMPOSER_TOKEN: ${{ secrets.CUSTOM_FIELDS_COMPOSER_TOKEN }}

      - name: Configure Composer auth
        run: composer config --global github-oauth.github.com "$CUSTOM_FIELDS_COMPOSER_TOKEN"
        env:
          CUSTOM_FIELDS_COMPOSER_TOKEN: ${{ secrets.CUSTOM_FIELDS_COMPOSER_TOKEN }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run test suite
        run: composer test
